name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Conductor.slnx

      - name: Build
        run: dotnet build Conductor.slnx --no-restore --warnaserror

      - name: Test
        run: dotnet test Conductor.slnx --no-build --collect:"XPlat Code Coverage"

      - name: Format check
        run: dotnet format Conductor.slnx --verify-no-changes
